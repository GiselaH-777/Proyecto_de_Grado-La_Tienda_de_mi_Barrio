<div class="main-wrapper">
  <div class="login-card">
    <div class="header-section">
      <div class="icon-container">
        <span class="shop-icon">🔑</span>
      </div>
      <h1 class="main-title">Nueva Contraseña</h1>
      <p class="welcome-text">Crea una clave segura para volver a la tienda.</p>
    </div>

    <form (ngSubmit)="actualizarPassword()" class="login-form">
      <div class="form-field">
        <label>Escribe tu nueva contraseña</label>
        <div class="input-wrapper">
          <span class="field-icon">🔒</span>
          <input 
            [type]="verPass1 ? 'text' : 'password'" 
            name="pass1" 
            [(ngModel)]="nuevaPassword" 
            placeholder="Mínimo 6 caracteres"
            required>
          <button type="button" class="eye-btn" (click)="verPass1 = !verPass1">
            {{ verPass1 ? '👁️‍🗨️' : '👁️' }}
          </button>
        </div>
      </div>

      <div class="form-field">
        <label>Confirma tu contraseña</label>
        <div class="input-wrapper">
          <span class="field-icon">✅</span>
          <input 
            [type]="verPass2 ? 'text' : 'password'" 
            name="pass2" 
            [(ngModel)]="confirmarPassword" 
            placeholder="Repite la clave aquí"
            required>
          <button type="button" class="eye-btn" (click)="verPass2 = !verPass2">
            {{ verPass2 ? '👁️‍🗨️' : '👁️' }}
          </button>
        </div>
      </div>

      <div class="form-field">
        <label for="email">Correo electrónico</label>
        <div class="input-wrapper">
          <span class="icon">📧</span>
          <input 
            type="email" 
            id="email" 
            [(ngModel)]="email" 
            placeholder="Ingresa tu correo" 
            name="email"
            required
          >
        </div>
      </div>

      <button type="submit" class="btn-main">Guardar y Entrar</button>
    </form>

    <div class="opciones-bajas">
      <a (click)="cancelar()" class="link-secundario">Cancelar y volver al inicio</a>
    </div>
  </div>
</div>

<div class="botones-container">
  <button (click)="actualizarPassword()">Guardar cambios</button>
  <button type="button" (click)="cancelar()">Cancelar</button>
</div>
